{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    /* تحسينات عامة للتجاوب */
    .student-grid {
        display: grid; 
        grid-template-columns: 1fr 1fr; 
        gap: 25px 50px; /* مسافات مريحة بين الحقول */
    }

    /* المقاس الوسطي الجديد للحقول */
    .custom-input {
        width: 100%;
        max-width: 450px; /* تم التوسيع من 350 إلى 450 ليصبح المقاس "قليل الصغر" وليس صغيراً جداً */
        height: 46px; 
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 0 15px;
        box-sizing: border-box;
        outline: none;
        font-size: 1em;
        transition: border-color 0.3s;
    }

    .custom-input:focus {
        border-color: #800000;
    }

    /* لضمان تناسق التسمية فوق الحقل */
    .grid-item {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
    }

    /* تنسيق خاص للجوال */
    @media (max-width: 768px) {
        .student-grid {
            grid-template-columns: 1fr !important;
            gap: 20px !important;
        }
        .custom-input {
            max-width: 100%; /* العودة للعرض الكامل فقط في الجوال لسهولة الاستخدام */
        }
    }
</style>

<div class="container" style="direction: rtl; text-align: right; font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; max-width: 1100px; margin: auto;">
    
    <div style="margin-bottom: 25px; border-right: 5px solid #800000; padding-right: 15px;">
        <h2 style="margin: 0; color: #800000; font-weight: bold;">🔍 نظام الاستعلام عن بيانات الطلاب</h2>
    </div>

    <div style="background: white; padding: 25px; border-radius: 15px; border: 1px solid #e0e0e0; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 30px;">
        <form method="GET" action="{% url 'student_search' %}">
            <label style="display: block; margin-bottom: 10px; font-weight: bold; color: #333;">ابحث عن الطالب:</label>
            <div style="display: flex; flex-wrap: wrap; gap: 15px; align-items: center;">
                <input type="text" name="search_query" id="student_input" list="student_list" autocomplete="off"
                    placeholder="الاسم أو الرقم الأكاديمي..." 
                    style="width: 100%; height: 48px; border-radius: 10px; border: 2px solid #800000; padding: 0 15px; outline: none; box-sizing: border-box; font-size: 1em;">
                <datalist id="student_list"></datalist>
                
                <button type="submit" style="background-color: #34495e; border: none; padding: 0 30px; height: 46px; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                    <span>📄</span> جلب البيانات
                </button>
            </div>
        </form>
    </div>

    {% if student %}
    <form method="POST" action="{% url 'update_student' student.academic_number %}" enctype="multipart/form-data" 
        style="background: white; padding: 35px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border-top: 8px solid #800000;">
        {% csrf_token %}
        
        <div style="border-bottom: 2px solid #f1f1f1; padding-bottom: 15px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center;">
            <h3 style="margin: 0; color: #800000; font-weight: bold;">📋 تفاصيل سجل الطالب</h3>
            <span style="background: #fff5f5; color: #800000; padding: 6px 18px; border-radius: 20px; font-weight: bold; border: 1px solid #feb2b2;">
                الحالة: {{ student.get_academic_status_display }}
            </span>
        </div>
        
        <div class="student-grid">
            <div class="grid-item">
                <label style="font-weight: bold; color: #444; margin-bottom: 8px;">الرقم الأكاديمي</label>
                <input type="text" value="{{ student.academic_number }}" readonly class="custom-input" style="background: #f8f9fa; color: #666;">
            </div>

            <div class="grid-item">
                <label style="font-weight: bold; color: #444; margin-bottom: 8px;">اسم الطالب</label>
                <input type="text" value="{{ student.student_name }}" readonly class="custom-input" style="background: #f8f9fa; color: #333;">
            </div>

            <div class="grid-item">
                <label style="font-weight: bold; color: #444; margin-bottom: 8px;">التخصص الدراسي</label>
                <input type="text" value="{{ student.specialization.specialization_name }}" readonly class="custom-input" style="background: #f8f9fa;">
            </div>

            <div class="grid-item">
                <label style="font-weight: bold; color: #444; margin-bottom: 8px;">المستوى الدراسي</label>
                <input type="text" value="{{ student.level.level_name }}" readonly class="custom-input" style="background: #f8f9fa;">
            </div>

            <div class="grid-item">
                <label style="font-weight: bold; color: #444; margin-bottom: 8px;">الفصل الدراسي</label>
                <input type="text" value="{{ student.semester.semester_name }}" readonly class="custom-input" style="background: #f8f9fa;">
            </div>

            <div class="grid-item">
                <label style="font-weight: bold; color: #444; margin-bottom: 8px;">الجنس</label>
                <input type="text" value="{% if student.gender == 'male' %}ذكر{% else %}أنثى{% endif %}" readonly class="custom-input" style="background: #f8f9fa;">
            </div>

            <div class="grid-item">
                <label style="font-weight: bold; color: #444; margin-bottom: 8px;">الحالة الأكاديمية</label>
                <input type="text" value="{{ student.get_academic_status_display }}" readonly class="custom-input" style="background: #fff5f5; color: #800000; border-color: #feb2b2;">
            </div>

            <div class="grid-item">
                <label style="font-weight: bold; color: #27ae60; margin-bottom: 8px;">تحديث الصورة الشخصية</label>
                <div class="custom-input" style="display: flex; align-items: center; gap: 12px; background: #f0fff4; border: 2px dashed #27ae60; padding: 0 10px;">
                    {% if student.profile_picture %}
                        <img src="{{ student.profile_picture.url }}" style="width: 32px; height: 32px; border-radius: 4px; object-fit: cover;">
                    {% endif %}
                    <input type="file" name="profile_picture" accept="image/*" style="font-size: 0.85em; width: 100%;">
                </div>
            </div>
        </div>

        <div style="margin-top: 40px; border-top: 1px solid #eee; padding-top: 25px;">
            <button type="submit" style="width: 100%; max-width: 450px; margin: auto; display: block; padding: 16px; background: #27ae60; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1em; box-shadow: 0 4px 15px rgba(39, 174, 96, 0.2);">
                💾 حفظ وتحديث البيانات
            </button>
        </div>
    </form>
    {% endif %}
</div>

<script>
document.getElementById('student_input').addEventListener('input', function(e) {
    const query = e.target.value;
    if (query.length < 2) return;
    fetch(`/academic/api/student-search/?q=${encodeURIComponent(query)}`)
        .then(response => response.json())
        .then(data => {
            const datalist = document.getElementById('student_list');
            datalist.innerHTML = ''; 
            data.results.forEach(student => {
                const option = document.createElement('option');
                option.value = student.id; 
                option.label = student.text; 
                datalist.appendChild(option);
            });
        });
});
</script>
{% endblock %}
