{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="container">
    
    
    <div class="page-title">➕ تسجيل طالب جديد في النظام</div>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %} <div class="section-box">
            <div class="section-title">📝 البيانات الأكاديمية والشخصية</div>
            
            <div class="grid-layout">
                <div class="form-group">
                    <label>الرقم الأكاديمي</label>
                    <input type="number" name="academic_number" placeholder="مثلاً: 20261001" required>
                </div>

                <div class="form-group">
                    <label>اسم الطالب الرباعي</label>
                    <input type="text" name="student_name" placeholder="أدخل الاسم الكامل" required>
                </div>

                <div class="form-group">
                    <label>التخصص الدراسي</label>
                    <select name="specialization" style="width: 100%; padding: 8px;">
                        {% for spec in specializations %}
                            <option value="{{ spec.id }}">{{ spec.specialization_name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label>الدفعة</label>
                    <select name="cohort" style="width: 100%; padding: 8px;">
                        {% for c in cohorts %}
                            <option value="{{ c.id }}">{{ c.cohort_name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label>المستوى الدراسي</label>
                    <select name="level" style="width: 100%; padding: 8px;">
                        {% for l in levels %}
                            <option value="{{ l.id }}">{{ l.level_name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label>الفصل الدراسي</label>
                    <select name="semester" style="width: 100%; padding: 8px;">
                        {% for s in semesters %}
                            <option value="{{ s.id }}">{{ s.semester_name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label>الجنس</label>
                    <select name="gender" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ced4da;">
                        <option value="male" {% if student.gender == 'male' %}selected{% endif %}>ذكر</option>
                        <option value="female" {% if student.gender == 'female' %}selected{% endif %}>أنثى</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>الحالة الأكاديمية</label>
                    <select name="academic_status" style="width: 100%; padding: 8px;">
                        <option value="active">نشط</option>
                        <option value="suspended">موقف</option>
                        <option value="graduated">خريج</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>صورة الطالب</label>
                    <input type="file" name="profile_picture" style="padding: 8px;">
                </div>
            </div>

            <button type="submit" class="btn-update" style="background-color: #27ae60; margin-top: 30px; cursor: pointer;">
                ✅ حفظ وتسجيل الطالب
            </button>
        </div>
    </form>
</div>
<script>
    setTimeout(function() {
    let container = document.querySelector('.messages-container');
    if (container) {
        container.style.transition = "opacity 0.6s ease";
        container.style.opacity = "0";
        setTimeout(() => container.remove(), 600);
    }
}, 5000);
</script>
{% endblock %}
