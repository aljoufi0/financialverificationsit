{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جامعة العلوم الحديثة</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link rel="stylesheet" href="{% static 'css/student_style.css' %}">
    <link rel="website icon"  type="png"    href="{% static 'img/3.png' %}">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* كود لفك أي انكماش وضمان ظهور النص تحت النافبار */
        body {
            margin: 0;
            padding: 0;
            display: block !important; /* فك أي flex قديم مسبب للانكماش */
            background-color: #f4f7f9;
        }
        
        main {
            display: block !important;
            width: 100% !important;
            min-height: 80vh;
            padding-top: 100px; /* هذه المسافة هي التي ستظهر النص المختفي "فوق" */
            box-sizing: border-box;
        }

        .content-wrapper {
            width: 95%;
            max-width: 1400px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    {% if request.path != '/login/' and request.path != '/students/student' %}
        {% include 'partials/_navbar.html' %}
    {% endif  %}

    <main>
        {% if messages %}
    <div class="messages-container" style="padding: 10px; text-align: center;">
        {% for message in messages %}
            <div class="alert {% if message.tags %}alert-{{ message.tags }}{% endif %}" 
                 style="padding: 15px; margin-bottom: 20px; border: 1px solid transparent; border-radius: 4px; 
                        {% if message.tags == 'error' %} color: #721c24; background-color: #f8d7da; border-color: #f5c6cb; {% else %} color: #155724; background-color: #d4edda; border-color: #c3e6cb; {% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    </div>
{% endif %}
        <div class="content-wrapper">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <script src="{% static 'js/JavaScript.js' %}"></script>
</body>
</html>
